server {
    listen       443 ssl;
    server_name  localhost;

    ssl_certificate      /etc/letsencrypt/live/vehicular-app-env.eba-tchumtwm.ap-southeast-2.elasticbeanstalk.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/vehicular-app-env.eba-tchumtwm.ap-southeast-2.elasticbeanstalk.com/privkey.pem;

    ssl_session_timeout  5m;
    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers   on;

    location / {
        proxy_pass  http://127.0.0.1:8080;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}