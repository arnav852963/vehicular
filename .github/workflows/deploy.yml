name: Deploy Node.js App to Elastic Beanstalk

on:
  push:
    branches:
      - main # Triggers the deployment when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Specify your Node.js version here (e.g., 18, 20, 22)
          cache: 'npm'       # Caches npm dependencies for faster subsequent builds

      - name: Install dependencies and Build
        run: |
          npm ci
          # npm run build --if-present # Uncomment this line if your project has a build step (e.g., React/TS)

      - name: Generate deployment package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*"
        # Note: We exclude "node_modules" from the zip because Elastic Beanstalk
        # automatically runs 'npm install' on the server during deployment.

      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: 'Your-EB-Application-Name' # Change this to your EB App Name
          environment_name: 'Your-EB-Environment-Name' # Change this to your EB Env Name
          version_label: 'deploy-${{ github.sha }}'
          region: 'us-east-1'                         # Change to your AWS region (e.g., ap-south-1)
          deployment_package: deploy.zip